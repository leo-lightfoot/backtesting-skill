<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="320" fill="#F8FAFC"/>
  <text x="60" y="44" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">Why this skill</text>

  <rect x="60" y="80" width="350" height="200" rx="16" fill="white" stroke="#E2E8F0"/>
  <text x="90" y="124" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Agent-First</text>
  <text x="90" y="156" fill="#334155" font-family="Source Sans 3, Arial, sans-serif" font-size="18">Designed for AI agents with</text>
  <text x="90" y="182" fill="#334155" font-family="Source Sans 3, Arial, sans-serif" font-size="18">structured inputs and outputs.</text>

  <rect x="425" y="80" width="350" height="200" rx="16" fill="white" stroke="#E2E8F0"/>
  <text x="455" y="124" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Schema-Driven</text>
  <text x="455" y="156" fill="#334155" font-family="Source Sans 3, Arial, sans-serif" font-size="18">Validate config before runtime</text>
  <text x="455" y="182" fill="#334155" font-family="Source Sans 3, Arial, sans-serif" font-size="18">for repeatable idea testing.</text>

  <rect x="790" y="80" width="350" height="200" rx="16" fill="#F0F9FF" stroke="#0284C7"/>
  <text x="820" y="124" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Built on Zipline</text>
